  </p>

<script>
async function generateResume() {
  const input = document.getElementById("userInput").value.trim();
  const output = document.getElementById("output");

  if (!input) {
    output.innerHTML = "⚠️ Please enter your experience.";
    return;
  }

  // loading animation
  output.innerHTML = "Generating <span class='animate-pulse'>...</span>";

  try {
    const res = await fetch("/.netlify/functions/resume", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ input })
    });

    const data = await res.json();
    console.log(data);

    if (data.output) {
      // format bullets nicely
      const formatted = data.output
        .split("\n")
        .map(line => `<div class="mb-2">• ${line.replace(/^[-•]\s*/, "")}</div>`)
        .join("");

      output.innerHTML = formatted;

    } else if (data.error) {
      output.innerHTML = "⚠️ " + data.error;
    } else {
      output.innerHTML = "No response received.";
    }

  } catch (err) {
    output.innerHTML = "❌ Failed to connect to AI.";
  }
}
</script>

</body>
