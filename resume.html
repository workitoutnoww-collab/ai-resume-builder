<script>
let isLoading = false;
const cache = {};

// FREE templates (cost saving)
const templates = {
  "built a calculator app": "• Developed a calculator application using JavaScript, improving problem-solving and UI design skills.",
  "worked on a website": "• Developed and deployed a responsive website, enhancing user experience and performance."
};

async function generateResume() {
  if (isLoading) return;

  let input = document.getElementById("input").value.trim().toLowerCase();
  let role = document.getElementById("role").value;
  let outputBox = document.getElementById("output");

  if (!input) {
    outputBox.innerText = "Enter your experience.";
    return;
  }

  if (input.length > 200) {
    outputBox.innerText = "Keep input short.";
    return;
  }

  // template (FREE)
  if (templates[input]) {
    outputBox.innerText = templates[input];
    return;
  }

  // cache (FREE)
  if (cache[input]) {
    outputBox.innerText = cache[input];
    return;
  }

  isLoading = true;
  outputBox.innerHTML = "Generating <span class='animate-pulse'>...</span>";

  try {
    const res = await fetch("/.netlify/functions/resume", {
      method: "POST",
      body: JSON.stringify({
        input: `Role: ${role}. ${input}`
      })
    });

    const data = await res.json();

    if (data.output) {
      cache[input] = data.output;
      outputBox.innerHTML = data.output.replace(/\\n/g, "<br><br>");
    } else {
      outputBox.innerText = "Error generating result.";
    }

  } catch {
    outputBox.innerText = "Connection error.";
  }

  isLoading = false;
}

// COPY
function copyText() {
  navigator.clipboard.writeText(document.getElementById("output").innerText);
  alert("Copied!");
}

// PDF
function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  let text = document.getElementById("output").innerText;
  doc.text(text, 10, 10);
  doc.save("resume.pdf");
}
</script>
